<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Bad UI - O Segredo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="containerPrincipal">
        <h1 id="titulo-principal">Olá :3</h1>

        <div id="camadaNormal" class="panel hidden">
            <p>Ufa! Conseguiu. Insira sua data normalmente agora:</p>
            <div class="good-ui-box">
                <input type="date" id="inputDataNormal">
                <button id="btnSalvarNormal" class="btn-good-salvar">Salvar Data</button>
            </div>
        </div>

        <div id="caosDraggable" class="panel">
            <p>Por favor, insira sua data de nascimento com muita paciência:</p>
            
            <div id="msgObvio" style="display: none; color: red; font-weight: bold; margin-bottom: 10px;">pare de tentar o óbvio</div>
            
            <div class="bad-ui-box">
                <h2 id="displayData">01/01/1900</h2>
                <button id="btnAvancar" class="btn-caos">Avançar 1 Dia</button>
            </div>
            <div class="salvar-box">
                <button id="btnSalvarCaos" class="btn-salvar-caos">Salvar Data</button>
            </div>
        </div>

        <div id="mensagemInvisivel" class="msg-invisivel">continue tentando</div>
    </div>

    <div id="telaErro" class="hidden fullscreen-error">
        <h1 class="texto-erro">Se cadastre primeiro</h1>
        <h2 class="texto-sub-erro">por favor</h2>
        
        <div class="form-cadastro">
            <input type="text" id="nomeCompleto" placeholder="Nome Completo">
            <input type="text" id="cpf" placeholder="CPF">
            <button id="btnProsseguir">Prosseguir</button>
        </div>
    </div>

    <div id="anuncioPopup" class="hidden">
        <img src="Captura de tela_2-4-2026_201442_www.instagram.com.jpeg" alt="Anúncio LabSIS" id="imgAnuncio">
    </div>

    <script src="db.js"></script>
    <script src="controller.js"></script>
</body>
</html>
