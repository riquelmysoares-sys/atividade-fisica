<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Exercício - FitLife Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .detail-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exercise-hero {
            width: 100%;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .exercise-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .exercise-hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px 30px;
            background: linear-gradient(transparent, var(--bg-main));
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-surface);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-card i {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .stat-card div {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .stat-card span {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .instructions-box {
            background: var(--bg-surface);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .instructions-box h3 {
            margin-bottom: 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: 1px solid var(--border);
        }

        .timer-box {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, var(--bg-surface), var(--bg-main));
            border-radius: 20px;
            border: 2px dashed var(--primary);
        }

        #timer-display {
            font-size: 4rem;
            font-weight: 800;
            font-family: monospace;
            color: var(--primary);
            margin: 20px 0;
        }
    </style>
</head>
<body class="bg-main">

    <a href="formulario.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="detail-container">
        <div class="exercise-hero">
            <img id="ex-img" src="" alt="Exercício">
            <div class="exercise-hero-overlay">
                <h1 id="ex-nome" style="font-size: 2.5rem;">Nome do Exercício</h1>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-redo"></i>
                <div id="ex-series">--</div>
                <span>Séries</span>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div id="ex-descanso">--</div>
                <span>Descanso</span>
            </div>
            <div class="stat-card">
                <i class="fas fa-fire"></i>
                <div id="ex-nivel">Fácil</div>
                <span>Esforço</span>
            </div>
        </div>

        <div class="instructions-box">
            <h3><i class="fas fa-list-check"></i> Como Executar</h3>
            <p id="ex-dica" style="line-height: 1.8; color: var(--text-muted);">
                Instruções detalhadas serão exibidas aqui.
            </p>
        </div>

        <div class="timer-box">
            <h3>Cronômetro de Descanso</h3>
            <div id="timer-display">00:00</div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="startTimer()" class="btn btn-primary">Iniciar</button>
                <button onclick="resetTimer()" class="btn btn-outline">Resetar</button>
            </div>
        </div>
    </div>

    <script>
        // Pega os dados salvos no sessionStorage pelo controller.js
        const exData = JSON.parse(sessionStorage.getItem('exercicioAtual'));
        
        if (exData) {
            document.getElementById('ex-nome').textContent = exData.nome;
            document.getElementById('ex-img').src = exData.img;
            document.getElementById('ex-series').textContent = exData.series;
            document.getElementById('ex-descanso').textContent = exData.descanso;
            document.getElementById('ex-dica').textContent = exData.dica || exData.desc;
        }

        // Lógica simples de timer
        let timer;
        let timeLeft = 60;

        function startTimer() {
            clearInterval(timer);
            const descansoTexto = document.getElementById('ex-descanso').textContent;
            const match = descansoTexto.match(/\d+/);
            const segundos = match ? parseInt(match[0]) : 60;
            timeLeft = segundos;
            
            updateDisplay();
            timer = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    alert("Descanso finalizado!");
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timer);
            timeLeft = 60;
            updateDisplay();
        }

        function updateDisplay() {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            document.getElementById('timer-display').textContent = 
                `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }
    </script>
</body>
</html>
